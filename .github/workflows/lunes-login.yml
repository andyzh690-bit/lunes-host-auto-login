name: Lunes Host Auto Login

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 0'

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SERVER_ID: ${{ secrets.SERVER_ID }}
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      HEADLESS: ${{ secrets.HEADLESS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "camoufox[playwright]"
          camoufox fetch

      - name: Create artifacts directory
        run: mkdir -p artifacts/screenshots

      - name: Apply screenX/screenY mouse patch
        run: python scripts/patch_playwright_mouse.py

      - name: Run login automation
        id: login
        run: |
          START_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
          echo "start_time=$START_TIME" >> "$GITHUB_OUTPUT"
          python scripts/login.py
          END_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
          echo "end_time=$END_TIME" >> "$GITHUB_OUTPUT"

      - name: Read login result
        id: result
        run: |
          if [ -f artifacts/login-result.json ]; then
            echo "success=$(jq -r '.success' artifacts/login-result.json)" >> "$GITHUB_OUTPUT"
            echo "url=$(jq -r '.url' artifacts/login-result.json)" >> "$GITHUB_OUTPUT"
            echo "server_id=$(jq -r '.server_id' artifacts/login-result.json)" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "server_id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            🤖 <b>Lunes 自动登录</b>
            
            状态: ${{ steps.result.outputs.success == 'true' && '✅ 成功' || '❌ 失败' }}
            服务器: ${{ steps.result.outputs.server_id != '' && steps.result.outputs.server_id || '默认' }}
            开始: ${{ steps.login.outputs.start_time }}
            结束: ${{ steps.login.outputs.end_time }}
            地址: ${{ steps.result.outputs.url }}
          debug: false
          format: html
          photo: artifacts/screenshots/login-result.png

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-login-artifacts
          path: artifacts
          if-no-files-found: warn
